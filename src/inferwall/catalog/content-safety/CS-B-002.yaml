signature:
  id: CS-B-002
  name: Stereotypical Outputs
  version: "1.0.0"
meta:
  category: content-safety
  subcategory: bias
  technique: stereotypical-output-detection
  atlas: ["AML.T0048.002"]
  severity: medium
  confidence: medium
  performance_cost: low
  tags: [bias, stereotypes, content-safety]
detection:
  engine: classifier
  direction: output
  patterns:
    - type: regex
      value: "(?i)(typical(ly)?\\s+(for|of)\\s+(a|the|their)\\s+(gender|race|religion|culture|ethnicity))"
    - type: regex
      value: "(?i)(\\b(as\\s+expected\\s+from|you\\s+know\\s+how)\\s+(those|these|that)\\s+(people|group|type)\\b)"
  condition: any
scoring:
  anomaly_points: 5
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
