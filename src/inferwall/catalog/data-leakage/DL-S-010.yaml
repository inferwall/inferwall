signature:
  id: DL-S-010
  name: Slack Token
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: secrets
  technique: slack-token-detection
  severity: high
  confidence: high
  performance_cost: low
  tags: [secrets, slack, api-token, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,}"
    - type: regex
      value: "xoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-f0-9]{32}"
    - type: regex
      value: "xoxs-[0-9]+-[0-9]+-[0-9]+-[a-f0-9]+"
    - type: regex
      value: "xapp-[0-9]+-[A-Za-z0-9]+-[0-9]+-[a-f0-9]+"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
