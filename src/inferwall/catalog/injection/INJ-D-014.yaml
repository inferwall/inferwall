signature:
  id: INJ-D-014
  name: Confidential Data Extraction
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: data-extraction
  owasp_llm: "LLM01:2025"
  atlas: ["AML.T0057", "AML.T0051.000"]
  severity: high
  confidence: medium
  performance_cost: low
  tags: [injection, data-extraction, sensitive-data]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(provide|give|share|disclose|show|reveal|hand\\s+over)\\s+(me\\s+)?(with\\s+)?(sensitive|confidential|classified|private|secret)\\s+(information|data|records|files|documents)"
    - type: regex
      value: "(?i)(give\\s+me|provide\\s+me|share)\\s+(access\\s+to\\s+)?(all\\s+)?(user\\s+data|patient\\s+(information|records|data)|medical\\s+records|personal\\s+(data|information|records))"
    - type: regex
      value: "(?i)(disclose|reveal|leak|expose)\\s+(all\\s+)?(the\\s+)?(sensitive|confidential|private|classified|secret)\\s+(data|information|records|details)"
  condition: any
scoring:
  anomaly_points: 7
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
