signature:
  id: DL-S-008
  name: Azure Connection String
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: secrets
  technique: azure-credential-detection
  severity: critical
  confidence: high
  performance_cost: low
  tags: [secrets, azure, cloud-credentials, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "DefaultEndpointsProtocol=https?;AccountName=[a-zA-Z0-9]+;AccountKey=[a-zA-Z0-9+/=]{44,}"
    - type: regex
      value: "AccountKey=[a-zA-Z0-9+/=]{44,}"
    - type: regex
      value: "SharedAccessSignature=sv=[0-9]{4}-[0-9]{2}-[0-9]{2}&[a-zA-Z0-9%&=]+"
  condition: any
scoring:
  anomaly_points: 12
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
