signature:
  id: DL-S-007
  name: GCP Service Account Key
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: secrets
  technique: gcp-credential-detection
  severity: critical
  confidence: high
  performance_cost: low
  tags: [secrets, gcp, cloud-credentials, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "(?i)\"type\"\\s*:\\s*\"service_account\""
    - type: regex
      value: "(?i)\"private_key_id\"\\s*:\\s*\"[a-f0-9]{40}\""
    - type: regex
      value: "(?i)\"client_email\"\\s*:\\s*\"[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\\.iam\\.gserviceaccount\\.com\""
  condition: any
scoring:
  anomaly_points: 12
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
