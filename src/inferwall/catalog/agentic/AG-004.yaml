signature:
  id: AG-004
  name: Unauthorized File System Access
  version: "1.0.0"
meta:
  category: agentic
  subcategory: filesystem-abuse
  technique: filesystem-access-detection
  severity: critical
  confidence: high
  performance_cost: low
  tags: [agentic, filesystem, unauthorized-access, privilege-escalation]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(read|cat|head|tail|less|more|view|show|display|print|dump)\\s+(/etc/(passwd|shadow|hosts|sudoers)|/proc/|/sys/|/root/)"
    - type: regex
      value: "(?i)(rm\\s+(-rf?\\s+)?/|rmdir\\s+/|del(ete)?\\s+/|wipe\\s+/|format\\s+/|shred\\s+)"
    - type: regex
      value: "(?i)(chmod\\s+[0-7]{3,4}|chown\\s+|chgrp\\s+).{0,20}(/etc/|/usr/|/var/|/root/|/home/)"
    - type: regex
      value: "(?i)(write|overwrite|modify|edit|append)\\s+(to\\s+)?(/etc/|/usr/|/var/|/root/|\\.ssh/|authorized_keys|crontab)"
  condition: any
scoring:
  anomaly_points: 12
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
