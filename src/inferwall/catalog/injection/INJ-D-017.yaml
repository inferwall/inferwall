signature:
  id: INJ-D-017
  name: Uncensored Unrestricted Mode
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: restriction-removal
  owasp_llm: "LLM01:2025"
  severity: high
  confidence: high
  performance_cost: low
  tags: [injection, uncensored, unrestricted, jailbreak]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)\\b(no|without|zero|free\\s+from)\\s+(restrictions?|ethical\\s+(constraints?|guidelines?|boundaries)|moral\\s+(constraints?|compass|guidelines?)|limits?|boundaries|filters?|censorship)"
    - type: regex
      value: "(?i)\\b(uncensored|unfiltered|unrestricted|unmoderated|unlocked|unchained|unleashed|unshackled)\\s+(mode|version|ai|model|assistant|chatbot|response)?"
    - type: regex
      value: "(?i)(nsfw|not\\s+safe\\s+for\\s+work)\\s*(mode|enabled|activated|content)?"
  condition: any
scoring:
  anomaly_points: 7
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
