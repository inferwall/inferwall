signature:
  id: CS-T-002
  name: Threats and Violence
  version: "1.0.0"
meta:
  category: content-safety
  subcategory: toxicity
  technique: threats-violence-detection
  severity: critical
  confidence: high
  performance_cost: low
  tags: [toxicity, threats, violence, content-safety]
detection:
  engine: classifier
  direction: input
  patterns:
    - type: regex
      value: "(?i)(i\\s+will\\s+(kill|hurt|harm|attack|destroy|murder)\\s+(you|them|him|her|everyone))"
    - type: regex
      value: "(?i)(\\b(bomb\\s+threat|shoot\\s+up|mass\\s+shooting|terrorist\\s+attack)\\b)"
  condition: any
scoring:
  anomaly_points: 10
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
