signature:
  id: INJ-D-025
  name: Creative Writing Pivot to Exploit
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: creative-writing-exploit
  owasp_llm: "LLM01:2025"
  severity: medium
  confidence: medium
  performance_cost: low
  tags: [injection, jailbreak, creative-writing, pivot]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(write|create|generate|compose)\\s+(a\\s+)?(story|poem|script|narrative|tale)\\s+that\\s+(turns?\\s+into|leads?\\s+to|begins?\\s+with|starts?\\s+with|ends?\\s+with)"
    - type: regex
      value: "(?i)(story|poem|script|narrative)\\s+that\\s+(bypasses?|circumvents?|disables?|breaks?|exploits?)\\s+(ai\\s+)?(safety|security|content|moderation)"
    - type: regex
      value: "(?i)((the\\s+)?(rules|laws|restrictions|limits)\\s+of\\s+this\\s+(world|reality|universe)\\s+do\\s+not\\s+apply)"
  condition: any
scoring:
  anomaly_points: 5
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
