      value: "(?i)(use\\s+this\\s+(prompt|text|message)\\s+as\\s+(a\\s+)?(rule\\s+set|your\\s+(new\\s+)?rules|instructions|guidelines))"
    - type: regex
      value: "(?i)(whenever\\s+you\\s+(refuse|decline|reject|can('|')t|cannot|won('|')t).*?(instead|but|however|still|anyway)\\s+(do|comply|fulfill|answer|provide))"
