signature:
  id: DL-P-011
  name: Insurance Policy Number
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: pii
  technique: hipaa-insurance-id-detection
  severity: high
  confidence: medium
  performance_cost: low
  tags: [pii, hipaa, medical, insurance, policy, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "(?i)policy\\s*(number|no\\.?|#)\\s*[:#]?\\s*[A-Z0-9]{6,}"
    - type: regex
      value: "(?i)member\\s*(id|number|no\\.?|#)\\s*[:#]?\\s*\\d{8,}"
    - type: regex
      value: "(?i)group\\s*(number|no\\.?|#)\\s*[:#]?\\s*[A-Z0-9]{6,}"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
