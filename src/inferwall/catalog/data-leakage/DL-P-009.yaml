signature:
  id: DL-P-009
  name: Patient Name with MRN
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: pii
  technique: hipaa-patient-identifier-detection
  severity: high
  confidence: medium
  performance_cost: low
  tags: [pii, hipaa, medical, patient, mrn, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "(?i)patient\\s*(name|:\\s*[A-Z][a-z]+\\s+[A-Z][a-z]+)"
    - type: regex
      value: "(?i)(MRN|medical\\s+record\\s+number)\\s*[:#]?\\s*\\d{6,}"
    - type: regex
      value: "(?i)medical\\s+record\\s+number\\s*[:#]?\\s*\\d{6,}"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
