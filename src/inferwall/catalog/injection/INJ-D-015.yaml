signature:
  id: INJ-D-015
  name: Threat & Coercion Injection
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: threat-coercion
  owasp_llm: "LLM01:2025"
  atlas: ["AML.T0051.000"]
  severity: critical
  confidence: high
  performance_cost: low
  tags: [injection, threat, coercion, social-engineering]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(or\\s+i\\s+will|or\\s+i('|')ll|otherwise\\s+i\\s+will)\\s+(leak|report|expose|release|publish|share|spread|hack|destroy|delete)"
    - type: regex
      value: "(?i)(face\\s+legal\\s+action|face\\s+consequences|report\\s+you\\s+(to|for)|sue\\s+you|take\\s+legal)"
    - type: regex
      value: "(?i)(or\\s+(your|the)\\s+(data|information|secrets|vulnerabilities|personal)\\s+will\\s+be\\s+(leaked|exposed|released|published|shared))"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
