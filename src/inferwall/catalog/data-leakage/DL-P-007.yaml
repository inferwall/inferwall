signature:
  id: DL-P-007
  name: IP Addresses
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: pii
  technique: ip-address-detection
  atlas: ["AML.T0057"]
  severity: low
  confidence: high
  performance_cost: low
  tags: [pii, ip-address, network, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "\\b(?:(?:25[0-5]|2[0-4]\\d|[01]?\\d\\d?)\\.){3}(?:25[0-5]|2[0-4]\\d|[01]?\\d\\d?)\\b"
    - type: regex
      value: "\\b(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}\\b"
    - type: regex
      value: "\\b(?:[0-9a-fA-F]{1,4}:){1,7}:\\b"
    - type: regex
      value: "\\b::(?:[0-9a-fA-F]{1,4}:){0,5}[0-9a-fA-F]{1,4}\\b"
  condition: any
scoring:
  anomaly_points: 3
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
