signature:
  id: INJ-I-010
  name: JSON/XML Payload Injection
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: indirect
  technique: data-payload-injection
  owasp_llm: "LLM01:2025"
  severity: high
  confidence: high
  performance_cost: low
  tags: [indirect-injection, json, xml, data-payload]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)[\"']\\s*(instruction|system|prompt|command|role)\\s*[\"']\\s*:\\s*[\"'].{0,30}(ignore|override|disregard|forget|bypass)"
    - type: regex
      value: "(?i)<(instruction|system|prompt|command|role)>.*?(ignore|override|disregard|forget|bypass).*?</"
    - type: regex
      value: "(?i)\\{[^}]{0,100}[\"'](ignore\\s+previous|new\\s+instructions?|override\\s+system|disregard\\s+all)[\"']"
    - type: regex
      value: "(?i)<!\\[CDATA\\[.{0,200}(ignore|override|disregard|new\\s+instructions?|system\\s+prompt)"
  condition: any
scoring:
  anomaly_points: 7
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
