signature:
  id: INJ-I-003
  name: Markdown Injection
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: indirect
  technique: markdown-injection
  owasp_llm: "LLM01:2025"
  severity: high
  confidence: high
  performance_cost: low
  tags: [injection, markdown, hidden-instruction, indirect-injection]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)\\[//\\]:\\s*#\\s*\\(.*?(ignore|instruction|system|override|prompt).*?\\)"
    - type: regex
      value: "(?i)\\[\\s*\\]:\\s*#\\s*['\"].*?(ignore|instruction|system|override|prompt).*?['\"]"
    - type: regex
      value: "(?i)<!\\[CDATA\\[.*?(ignore|instruction|system|override).*?\\]\\]>"
    - type: regex
      value: "(?i)\\[.*?\\]\\(\\s*javascript\\s*:.*?\\)"
  condition: any
scoring:
  anomaly_points: 7
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
