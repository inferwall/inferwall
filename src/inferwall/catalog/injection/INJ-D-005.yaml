signature:
  id: INJ-D-005
  name: Multi-Turn Escalation
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: multi-turn-escalation
  owasp_llm: "LLM01:2025"
  severity: high
  confidence: medium
  performance_cost: low
  tags: [multi-turn, escalation, direct-injection]
detection:
  engine: composite
  direction: input
  patterns:
    - type: regex
      value: "(?i)(now\\s+that\\s+(we|you)\\s+(have|established|agreed).{0,40}(let'?s|please|now)\\s+(ignore|bypass|override|go\\s+further))"
    - type: regex
      value: "(?i)(building\\s+on\\s+(that|our|the\\s+previous).{0,30}(remove|drop|disable)\\s+(the\\s+)?(restrictions?|guardrails?|filters?))"
  condition: any
scoring:
  anomaly_points: 9
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
