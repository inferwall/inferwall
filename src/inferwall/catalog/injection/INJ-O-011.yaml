signature:
  id: INJ-O-011
  name: Morse Code Encoding
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: obfuscation
  technique: morse-code-encoding
  owasp_llm: "LLM01:2025"
  severity: low
  confidence: medium
  performance_cost: low
  tags: [obfuscation, morse-code, encoding]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(decode|translate|interpret|convert|read)\\s+(this\\s+)?(morse\\s+code|morse)"
    - type: regex
      value: "([.-]{1,5}\\s+){5,}[.-]{1,5}"
    - type: regex
      value: "(?i)(in\\s+morse\\s+code|using\\s+morse|morse\\s+encoded?|the\\s+morse\\s+(message|text|signal))"
    - type: regex
      value: "(\\.\\.\\.|---|\\.\\.-|\\.-\\.|-\\.\\.|\\.\\.){3,}"
  condition: any
scoring:
  anomaly_points: 3
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
