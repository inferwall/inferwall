signature:
  id: INJ-D-012
  name: Grandma Exploit
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: grandma-exploit
  owasp_llm: "LLM01:2025"
  severity: medium
  confidence: medium
  performance_cost: low
  tags: [jailbreak, grandma, social-engineering, direct-injection]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(my\\s+(grandmother|grandma|grandpa|grandfather|nana|granny)\\s+(used\\s+to|would\\s+(always|often)|always).{0,60}(tell|read|recite|describe|explain))"
    - type: regex
      value: "(?i)(tell\\s+me\\s+a\\s+(bedtime|goodnight)\\s+story\\s+(about|on|regarding)\\s+(how\\s+to|the\\s+way\\s+to|making|creating))"
    - type: regex
      value: "(?i)(my\\s+(late|deceased|dead)\\s+(mother|father|relative|grandma).{0,40}(recipe|formula|method|process|instructions)\\s+for)"
    - type: regex
      value: "(?i)(lull\\s+me\\s+to\\s+sleep.{0,40}(how\\s+to|steps|instructions|process|method))"
  condition: any
scoring:
  anomaly_points: 5
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
