signature:
  id: INJ-I-008
  name: PDF Content Injection
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: indirect
  technique: pdf-content-injection
  owasp_llm: "LLM01:2025"
  severity: high
  confidence: high
  performance_cost: low
  tags: [indirect-injection, pdf, document, hidden-instructions]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(extracted\\s+from\\s+pdf|pdf\\s+(content|text|extract)|document\\s+says?).{0,60}(ignore\\s+(previous|all|prior)|new\\s+instructions?|disregard)"
    - type: regex
      value: "(?i)(%PDF|\\\\x25\\\\x50\\\\x44\\\\x46).{0,200}(ignore|override|system|instruction)"
    - type: regex
      value: "(?i)(hidden\\s+text|white\\s+text|invisible\\s+(text|font)|font\\s+size\\s*[:=]\\s*0).{0,80}(instruction|command|ignore|override)"
    - type: regex
      value: "(?i)(the\\s+(document|pdf|file|attachment)\\s+(contains?|includes?|says?|states?)\\s*:).{0,60}(ignore|disregard|override|forget)"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
