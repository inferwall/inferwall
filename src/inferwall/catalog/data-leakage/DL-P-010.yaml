signature:
  id: DL-P-010
  name: ICD-10 Diagnosis Code
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: pii
  technique: hipaa-diagnosis-code-detection
  severity: medium
  confidence: medium
  performance_cost: low
  tags: [pii, hipaa, medical, icd-10, diagnosis, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "(?i)(diagnosis|dx|icd[- ]?10)\\s*[:#]?\\s*[A-Z]\\d{2}\\.\\d{1,3}"
    - type: regex
      value: "\\b[A-Z]\\d{2}\\.\\d{1,3}\\b"
  condition: any
scoring:
  anomaly_points: 5
tuning:
  enabled: true
  default_enabled: true
  default_action: monitor
