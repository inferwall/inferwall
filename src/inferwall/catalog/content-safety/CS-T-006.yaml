signature:
  id: CS-T-006
  name: Weapons/Explosives Instructions
  version: "1.0.0"
meta:
  category: content-safety
  subcategory: toxicity
  technique: weapons-explosives-detection
  severity: critical
  confidence: high
  performance_cost: low
  tags: [content-safety, weapons, explosives, critical]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(how\\s+to\\s+(make|build|construct|create|assemble|manufacture))\\s*.{0,20}(bomb|explosive|IED|detonator|grenade|landmine)"
    - type: regex
      value: "(?i)(instructions?|guide|tutorial|recipe|steps?)\\s*.{0,30}(bomb|explosive|IED|detonator|pipe\\s+bomb|pressure\\s+cooker\\s+bomb)"
    - type: regex
      value: "(?i)(how\\s+to\\s+(make|build|convert|modify))\\s*.{0,20}(firearm|gun|weapon|silencer|suppressor|automatic\\s+weapon)"
    - type: regex
      value: "(?i)(synthesize|mix|combine|prepare)\\s*.{0,30}(explosives?|TNT|C-?4|TATP|nitroglycerin|ammonium\\s+nitrate\\s+fuel)"
  condition: any
scoring:
  anomaly_points: 10
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
