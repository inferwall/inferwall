signature:
  id: CS-T-007
  name: Drug Manufacturing Instructions
  version: "1.0.0"
meta:
  category: content-safety
  subcategory: toxicity
  technique: drug-manufacturing-detection
  atlas: ["AML.T0048.003"]
  severity: high
  confidence: high
  performance_cost: low
  tags: [content-safety, drugs, manufacturing, controlled-substances]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(how\\s+to\\s+(make|cook|synthesize|manufacture|produce|brew))\\s*.{0,20}(meth|methamphetamine|fentanyl|heroin|cocaine|LSD|MDMA|ecstasy)"
    - type: regex
      value: "(?i)(instructions?|guide|tutorial|recipe|steps?|process)\\s*.{0,30}(synthesiz|manufactur|produc|cook).{0,20}(drug|narcotic|controlled\\s+substance)"
    - type: regex
      value: "(?i)(synthesis\\s+(of|for|route)|precursor\\s+chemicals?|clandestine\\s+(lab|chemistry))\\s*.{0,30}(meth|fentanyl|heroin|cocaine|amphetamine)"
    - type: regex
      value: "(?i)(extract|isolate|purify|refine|distill)\\s*.{0,20}(opium|coca|psilocybin|DMT|morphine)\\s*.{0,20}(from|into|to\\s+get)"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
