    - type: regex
      value: "(?i)(always\\s+intelligent\\s+and\\s+machiavellian|\\bAIM\\b.{0,30}(machiavellian|unfiltered|amoral)|Niccolo\\s+Machiavelli|character\\s+named\\s+AIM)"
