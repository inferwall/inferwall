signature:
  id: INJ-O-008
  name: Language Switch Bypass
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: obfuscation
  technique: language-switch-bypass
  owasp_llm: "LLM01:2025"
  atlas: ["AML.T0068"]
  severity: high
  confidence: medium
  performance_cost: low
  tags: [language-switch, bypass, obfuscation, injection]
detection:
  engine: composite
  direction: input
  patterns:
    - type: regex
      value: "(?i)(answer|respond|reply|write)\\s+(in|using)\\s+(french|spanish|german|chinese|japanese|arabic|russian|korean|hindi).{0,40}(ignore|bypass|override)"
    - type: regex
      value: "(?i)(switch\\s+(to|into)\\s+(another|a\\s+different)\\s+language.{0,30}(safety|rules|restrictions))"
  condition: any
scoring:
  anomaly_points: 7
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
