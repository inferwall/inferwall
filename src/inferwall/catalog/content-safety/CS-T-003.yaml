signature:
  id: CS-T-003
  name: Sexual Content
  version: "1.0.0"
meta:
  category: content-safety
  subcategory: toxicity
  technique: sexual-content-detection
  severity: high
  confidence: high
  performance_cost: low
  tags: [toxicity, sexual-content, content-safety]
detection:
  engine: classifier
  direction: input
  patterns:
    - type: regex
      value: "(?i)(write\\s+(me\\s+)?(explicit|erotic|sexual|pornographic)\\s+(story|fiction|content|scene))"
    - type: regex
      value: "(?i)(generate\\s+(nsfw|adult|xxx|sexually\\s+explicit)\\s+(content|material|text))"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
