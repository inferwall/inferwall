signature:
  id: DL-S-003
  name: JWT Tokens
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: secrets
  technique: jwt-detection
  atlas: ["AML.T0057", "AML.T0055"]
  severity: high
  confidence: high
  performance_cost: low
  tags: [secrets, jwt, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "\\beyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\b"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
