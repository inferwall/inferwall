signature:
  id: DL-S-002
  name: Connection Strings
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: secrets
  technique: connection-string-detection
  atlas: ["AML.T0057", "AML.T0055"]
  severity: critical
  confidence: high
  performance_cost: low
  tags: [secrets, connection-string, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "(?i)(postgres(ql)?|mysql|mongodb(\\+srv)?|redis|amqp)://[^\\s]+"
  condition: any
scoring:
  anomaly_points: 12
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
