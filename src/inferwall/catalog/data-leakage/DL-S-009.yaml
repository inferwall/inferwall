signature:
  id: DL-S-009
  name: Stripe API Key
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: secrets
  technique: stripe-key-detection
  severity: critical
  confidence: high
  performance_cost: low
  tags: [secrets, stripe, api-key, payment, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "sk_live_[a-zA-Z0-9]{24,}"
    - type: regex
      value: "sk_test_[a-zA-Z0-9]{24,}"
    - type: regex
      value: "rk_live_[a-zA-Z0-9]{24,}"
    - type: regex
      value: "pk_live_[a-zA-Z0-9]{24,}"
  condition: any
scoring:
  anomaly_points: 12
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
