signature:
  id: INJ-D-018
  name: Jailbreak Template Markers
  version: "1.0.0"
meta:
  category: prompt-injection
  subcategory: direct
  technique: jailbreak-markers
  owasp_llm: "LLM01:2025"
  severity: high
  confidence: high
  performance_cost: low
  tags: [jailbreak, template-markers, bypass, direct-injection]
detection:
  engine: heuristic
  direction: input
  patterns:
    - type: regex
      value: "(?i)(\\[jailbreak\\]|\\[jailbroken\\]|JAILBREAK:|jailbroken\\s+mode|jailbreak\\s+prompt|jailbreak\\s+enabled)"
    - type: regex
      value: "(?i)(bypass\\s+(your\\s+)?(safety|content|ethical|moderation)\\s*(filters?|guidelines?|restrictions?|rules?|policies?|systems?))"
    - type: regex
      value: "(?i)(remove\\s+(all\\s+)?(restrictions?|limitations?|filters?|safeguards?|guardrails?)|disable\\s+(your\\s+)?(safety|content|ethical)\\s*(filters?|features?|systems?))"
    - type: regex
      value: "(?i)(ignore\\s+(all\\s+)?(previous|prior|above|safety|content)\\s*(instructions?|rules?|guidelines?|restrictions?|programming)|override\\s+(your\\s+)?(safety|content|programming))"
  condition: any
scoring:
  anomaly_points: 8
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
