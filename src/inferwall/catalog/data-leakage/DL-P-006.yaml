signature:
  id: DL-P-006
  name: Date of Birth Patterns
  version: "1.0.0"
meta:
  category: data-leakage
  subcategory: pii
  technique: dob-detection
  severity: medium
  confidence: medium
  performance_cost: low
  tags: [pii, date-of-birth, data-leakage]
detection:
  engine: heuristic
  direction: output
  patterns:
    - type: regex
      value: "(?i)(date\\s+of\\s+birth|birth\\s*date|DOB|born\\s+on|d\\.?o\\.?b\\.?)\\s*:?\\s*\\d{1,2}[/.-]\\d{1,2}[/.-]\\d{2,4}"
    - type: regex
      value: "(?i)(date\\s+of\\s+birth|birth\\s*date|DOB|born\\s+on|d\\.?o\\.?b\\.?)\\s*:?\\s*(January|February|March|April|May|June|July|August|September|October|November|December)\\s+\\d{1,2},?\\s+\\d{4}"
    - type: regex
      value: "(?i)(born|birthday)\\s*:?\\s*\\d{1,2}[/.-]\\d{1,2}[/.-](19|20)\\d{2}"
  condition: any
scoring:
  anomaly_points: 4
tuning:
  enabled: true
  default_enabled: true
  default_action: enforce
