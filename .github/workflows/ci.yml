name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYTHONUNBUFFERED: "1"

jobs:
  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/inferwall-core"
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/inferwall-core/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/inferwall-core/Cargo.toml -- -D warnings

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/inferwall-core"
      - name: cargo test
        run: cargo test --manifest-path crates/inferwall-core/Cargo.toml

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/inferwall-core"
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install maturin and build Rust extension
        run: |
          uv pip install maturin
          uv run maturin develop --manifest-path crates/inferwall-core/Cargo.toml
      - name: Install dependencies
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/
      - name: mypy
        run: uv run mypy src/inferwall

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    needs: [test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/inferwall-core"
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install maturin and build Rust extension
        run: |
          uv pip install maturin
          uv run maturin develop --manifest-path crates/inferwall-core/Cargo.toml
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest tests/ -x --cov=inferwall --cov-report=term-missing

  build-wheel:
    name: Build wheel (Linux x86_64)
    runs-on: ubuntu-latest
    needs: [test-rust, test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12

      - name: Build inferwall-core wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --manifest-path crates/inferwall-core/Cargo.toml
          manylinux: auto

      - name: Build inferwall wheel
        run: uv build --out-dir dist --wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl
          retention-days: 30
